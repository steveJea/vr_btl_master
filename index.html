<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR BATTLE MASTERS • Real Data</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: system-ui, sans-serif; }
        .title-font { font-family: 'Anton', Impact, system-ui, sans-serif; }
        .section { display: none !important; }
        .section.active { display: block !important; }
    </style>
</head>
<body class="bg-zinc-950 text-white">
    <div class="max-w-7xl mx-auto p-6">
        <div class="flex justify-between items-center mb-6">
            <h1 class="title-font text-4xl">VR BATTLE MASTERS <span class="text-red-500 text-xl">(Real Data)</span></h1>
            <button onclick="restartGame()" class="px-4 py-2 bg-zinc-800 rounded">처음으로</button>
        </div>

        <!-- MAIN -->
        <div id="main-screen" class="section active text-center py-20">
            <h2 class="text-6xl font-bold mb-4">VIOLENCE ROYALE</h2>
            <p class="text-xl text-zinc-400 mb-8">실제 VR_DATA.csv 기반 카드 배틀</p>
            <button onclick="startGame()" class="px-10 py-4 bg-red-600 text-xl font-bold rounded-2xl">게임 시작</button>
        </div>

        <!-- CHOICE -->
        <div id="choice-screen" class="section text-center py-10">
            <h2 class="text-4xl mb-8">게임 모드 선택</h2>
            <div class="flex justify-center gap-6">
                <button onclick="selectGameMode(5)" class="px-8 py-6 bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 rounded-2xl text-2xl">5 VS 5</button>
                <button onclick="selectGameMode(10)" class="px-8 py-6 bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 rounded-2xl text-2xl">10 VS 10</button>
                <button onclick="selectGameMode(20)" class="px-8 py-6 bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 rounded-2xl text-2xl">20 VS 20</button>
            </div>
        </div>

        <!-- DECK -->
        <div id="deck-screen" class="section">
            <div class="flex justify-between mb-4">
                <div>
                    <span id="mode-badge" class="text-2xl font-bold"></span>
                    <span class="ml-4 text-sm text-zinc-400">실제 데이터 로드됨</span>
                </div>
                <div>
                    <button onclick="changeDeck()" class="px-5 py-2 bg-zinc-800 rounded mr-2">덱 변경 (3회)</button>
                    <button onclick="confirmDeck()" class="px-6 py-2 bg-red-600 rounded font-bold">배틀 시작</button>
                </div>
            </div>
            <div id="deck-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
        </div>

        <!-- BATTLE -->
        <div id="battle-screen" class="section">
            <div class="mb-4 flex justify-between">
                <div id="battle-info" class="text-xl font-bold"></div>
                <div><span class="text-emerald-400">WIN</span> <span id="win-count">0</span> / <span class="text-red-400">LOSE</span> <span id="lose-count">0</span></div>
            </div>
            <div id="my-hand" class="flex flex-wrap gap-3"></div>
        </div>
    </div>

    <script>
        const BASE = './';
        let cardPool = [];

        // CSV 파싱 함수
        function parseCSV(csvText) {
            const lines = csvText.trim().split('\n');
            const headers = lines[0].split(',');
            
            return lines.slice(1).map(line => {
                const values = line.split(',');
                const obj = {};
                headers.forEach((header, i) => {
                    obj[header.trim()] = values[i] ? values[i].trim() : '';
                });
                return {
                    id: obj.id,
                    name: obj.name,
                    gender: obj.gender,
                    age: parseInt(obj.age),
                    region: obj.region,
                    grade: obj.grade,
                    class: obj.class,
                    attribute: obj.attribute,
                    power: parseInt(obj.power) || 0
                };
            });
        }

        // 실제 데이터 로드
        async function loadRealData() {
            try {
                const res = await fetch('https://raw.githubusercontent.com/steveJea/vr-ideal-worldcup/main/VR_DATA.csv');
                const text = await res.text();
                cardPool = parseCSV(text);
                console.log(`[성공] ${cardPool.length}장의 실제 카드 데이터를 로드했습니다.`);
            } catch (e) {
                console.error('CSV 로드 실패. 샘플 데이터 사용');
                // 실패 시 최소 샘플
                cardPool = [
                    {id:"2000100001", name:"Lim Yu-ri", gender:"female", age:16, region:"Gangnam-gu", grade:"ULTRA RARE", class:"dark", attribute:"fascination", power:2452},
                    {id:"2002000352", name:"Kim Ji-woo", gender:"female", age:18, region:"Yongsan-gu", grade:"HIGH RARE", class:"light", attribute:"support", power:996}
                ];
            }
        }

        let gameState = { mode:5, playerDeck:[], remainingPlayer:[], remainingOpp:[], wins:0, loses:0, selectedCardId:null };

        function getGradeColor(g) {
            return { "NORMAL":"slate", "RARE":"blue", "HIGH RARE":"violet", "SUPER RARE":"pink", "ULTRA RARE":"amber", "MYTHIC RARE":"red" }[g] || "slate";
        }

        function shuffle(a){ return [...a].sort(()=>Math.random()-0.5); }

        function dealCards(mode) {
            // 간단하게 전체에서 랜덤 추출 (실제로는 등급 분포에 맞춰야 하지만 우선 동작하게)
            return shuffle(cardPool).slice(0, mode);
        }

        function showScreen(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startGame() { showScreen('choice-screen'); }

        function selectGameMode(m) {
            gameState.mode = m;
            gameState.playerDeck = dealCards(m);
            gameState.remainingPlayer = [...gameState.playerDeck];
            gameState.wins = 0; gameState.loses = 0;
            showDeckScreen();
        }

        function showDeckScreen() {
            showScreen('deck-screen');
            document.getElementById('mode-badge').innerText = `${gameState.mode} VS ${gameState.mode}`;
            renderDeckGrid();
        }

        function renderDeckGrid() {
            const grid = document.getElementById('deck-grid');
            grid.innerHTML = '';
            gameState.playerDeck.forEach(card => {
                const el = document.createElement('div');
                el.className = `bg-zinc-900 border border-zinc-700 rounded-2xl p-4 cursor-pointer hover:border-violet-400`;
                el.innerHTML = `
                    <div class="font-bold text-xl">${card.name}</div>
                    <div class="text-sm text-zinc-400">${card.grade} • ${card.region}</div>
                    <div class="mt-3 text-4xl font-black text-right">${card.power}</div>
                `;
                el.onclick = () => showCardModal(card);
                grid.appendChild(el);
            });
        }

        function showCardModal(card) {
            alert(`${card.name}\nGrade: ${card.grade}\nPower: ${card.power}\nRegion: ${card.region}`);
        }

        function changeDeck() {
            gameState.playerDeck = dealCards(gameState.mode);
            renderDeckGrid();
        }

        function confirmDeck() {
            gameState.remainingPlayer = [...gameState.playerDeck];
            gameState.remainingOpp = shuffle([...cardPool]).slice(0, gameState.mode);
            showBattleScreen();
        }

        function showBattleScreen() {
            showScreen('battle-screen');
            renderMyHand();
        }

        function renderMyHand() {
            const container = document.getElementById('my-hand');
            container.innerHTML = '';
            gameState.remainingPlayer.forEach(card => {
                const el = document.createElement('div');
                el.className = `bg-zinc-900 border border-white/30 p-4 rounded-2xl cursor-pointer w-44`;
                el.innerHTML = `<div class="font-bold">${card.name}</div><div class="text-3xl font-black text-right">${card.power}</div>`;
                el.onclick = () => selectCardToBattle(card, el);
                container.appendChild(el);
            });
        }

        function selectCardToBattle(myCard, el) {
            if (gameState.remainingOpp.length === 0) return;

            const oppCard = gameState.remainingOpp.shift();
            const myWin = myCard.power > oppCard.power;

            if (myWin) gameState.wins++;
            else gameState.loses++;

            alert(`${myCard.name} (${myCard.power}) vs ${oppCard.name} (${oppCard.power})\n\n${myWin ? 'WIN!' : 'LOSE'}`);

            // 카드 제거
            gameState.remainingPlayer = gameState.remainingPlayer.filter(c => c.id !== myCard.id);
            renderMyHand();

            if (gameState.remainingPlayer.length === 0) {
                finishGame();
            }
        }

        function finishGame() {
            const isWin = gameState.wins > gameState.loses;
            alert(`게임 종료!\n${gameState.wins}승 ${gameState.loses}패\n${isWin ? '당신의 승리!' : '패배...'}`);
            showScreen('main-screen');
        }

        function restartGame() {
            location.reload();
        }

        async function initGame() {
            await loadRealData();           // ← 여기서 실제 CSV 로드
            showScreen('main-screen');
            console.log('%c[완료] 실제 VR_DATA.csv 기반으로 게임이 준비되었습니다.', 'color:#22c55e');
        }

        window.onload = initGame;
    </script>
</body>
</html>
